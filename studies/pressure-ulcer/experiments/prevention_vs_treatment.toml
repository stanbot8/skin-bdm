# Experiment: Prevention vs Treatment Timing
#
# The central clinical question for pressure ulcers: is early prevention
# (before tissue damage accumulates) more effective than late intervention
# (after Stage III has developed)? Compare three scenarios:
#   1. No intervention (constant pressure, worst case)
#   2. Early prevention (2h repositioning from day 0)
#   3. Late treatment (intervention after Stage III, approximated as 50% effect)
#
# This mirrors the clinical reality that prevention costs far less than
# treatment, both financially and in patient outcomes.

[experiment]
name = "Prevention vs Treatment"
description = "Early prevention versus late treatment for pressure ulcers"
profile = "pressure"
study = "pressure-ulcer"
runs_per_config = 5

# ---------------------------------------------------------------------------
# No intervention: constant pressure, no repositioning
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "No Intervention"

# ---------------------------------------------------------------------------
# Early prevention: 2h repositioning + redistribution surface from day 0
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Early Prevention (Day 0)"
treatments = ["pressure_redistribution"]

# ---------------------------------------------------------------------------
# Late treatment: intervention after Stage III established (~day 14)
# Approximated by interpolating 50% between untreated and full treatment
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Late Treatment (Day 14, 50%)"
[experiment.configs.overrides]
"skin.pressure.compression_threshold" = 0.4    # 0.3 + 0.5*(0.5-0.3)
"skin.pressure.ischemia_rate" = 0.014          # 0.02 - 0.5*(0.02-0.008)
"skin.pressure.tissue_damage_rate" = 0.002     # 0.003 - 0.5*(0.003-0.001)
"skin.pressure.moisture_damage_rate" = 0.00065 # 0.001 - 0.5*(0.001-0.0003)
"skin.pressure.shear_factor" = 1.3             # 1.5 - 0.5*(1.5-1.1)
"skin.pressure.reposition_interval_h" = 2      # repositioning begins
"skin.perfusion.basal" = 0.65                  # 0.6 + 0.5*(0.7-0.6)
