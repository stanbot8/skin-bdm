# Experiment: RA Disease Severity Spectrum
#
# Scale autoimmune activity from mild (0.5x) through default (1.0x)
# to severe (2.0x). Tests whether a threshold exists between
# self-limiting flare and progressive cartilage destruction.

[experiment]
name = "RA Severity Spectrum"
description = "Sweep autoimmune flare intensity from mild to severe"
profile = "rheumatoid"
study = "rheumatoid"
runs_per_config = 5

# ---------------------------------------------------------------------------
# Mild RA (0.5x autoimmune activity)
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Mild (0.5x)"
[experiment.configs.overrides]
"skin.ra.autoimmune_source" = 0.0005
"skin.ra.il6_autoimmune_source" = 0.00075
"skin.ra.pannus_fibroblast_boost" = 1.5
"skin.ra.m1_prolongation" = 1.5
"skin.immune.macrophage_m1_duration_h" = 72
"skin.immune.macrophage_spawn_taper" = 0.0005

# ---------------------------------------------------------------------------
# Moderate RA (0.75x)
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Moderate (0.75x)"
[experiment.configs.overrides]
"skin.ra.autoimmune_source" = 0.00075
"skin.ra.il6_autoimmune_source" = 0.0011
"skin.ra.pannus_fibroblast_boost" = 1.75
"skin.ra.m1_prolongation" = 1.75
"skin.immune.macrophage_m1_duration_h" = 84
"skin.immune.macrophage_spawn_taper" = 0.00025

# ---------------------------------------------------------------------------
# Default RA (1.0x, no overrides)
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Default (1.0x)"

# ---------------------------------------------------------------------------
# Severe RA (1.5x autoimmune activity)
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Severe (1.5x)"
[experiment.configs.overrides]
"skin.ra.autoimmune_source" = 0.0015
"skin.ra.il6_autoimmune_source" = 0.00225
"skin.ra.pannus_fibroblast_boost" = 2.5
"skin.ra.m1_prolongation" = 2.5
"skin.ra.tnf_inflammation_coupling" = 0.0045
"skin.ra.il6_inflammation_coupling" = 0.003
"skin.immune.macrophage_m1_duration_h" = 108

# ---------------------------------------------------------------------------
# Very severe RA (2.0x autoimmune activity)
# ---------------------------------------------------------------------------
[[experiment.configs]]
label = "Very Severe (2.0x)"
[experiment.configs.overrides]
"skin.ra.autoimmune_source" = 0.002
"skin.ra.il6_autoimmune_source" = 0.003
"skin.ra.pannus_fibroblast_boost" = 3.0
"skin.ra.m1_prolongation" = 3.0
"skin.ra.tnf_inflammation_coupling" = 0.006
"skin.ra.il6_inflammation_coupling" = 0.004
"skin.ra.cartilage_mmp_degradation" = 0.001
"skin.ra.cartilage_tnf_degradation" = 0.0004
"skin.immune.macrophage_m1_duration_h" = 120
