# Module: rheumatoid -- rheumatoid arthritis (synovial inflammation and cartilage erosion)
# Smolen et al. 2018 (doi:10.1038/nrdp.2018.1)
# Firestein 2003 (doi:10.1038/nature01661)
# Feldmann & Maini 2003 (doi:10.1038/nm939)
# McInnes & Schett 2011 (doi:10.1056/NEJMra1004965)
[skin.ra]
enabled = false

# TNF-alpha cytokine field
tnf_diffusion = 0.04                     # 17 kDa homotrimer diffusion
tnf_decay = 0.05                         # TNFR1/R2 receptor endocytosis clearance

# IL-6 cytokine field (second inflammatory axis)
# Kishimoto 2005 (doi:10.1146/annurev.immunol.23.021704.115806)
il6_diffusion = 0.05                     # 21 kDa, slightly faster than TNF
il6_decay = 0.04                         # IL-6R/gp130 receptor endocytosis clearance

# Autoimmune cytokine production (FLS, Th1/Th17 T cells)
autoimmune_source = 0.0015               # chronic TNF-alpha production (stronger drive)
il6_autoimmune_source = 0.002            # chronic IL-6 production

# Immune cell cytokine production (inflammation-proportional proxy)
tnf_m1_rate = 0.0015                     # TNF from M1 macrophages (scaled by inflammation)
tnf_neutrophil_rate = 0.0008             # TNF from neutrophils (scaled by inflammation)
il6_m1_rate = 0.0015                     # IL-6 from M1 macrophages (scaled by inflammation)

# Autoimmune flare dynamics (sigmoid activation after wounding)
flare_delay = 150                        # steps before flare onset (~0.6 days post-wound)
flare_steepness = 0.04                   # sharper onset for day 6-7 TNF peak

# TNF-alpha downstream effects
tnf_inflammation_coupling = 0.003        # TNF -> NF-kB -> generic inflammation amplification
tnf_mmp_boost = 0.004                    # TNF -> MMP-1/3/13 transcription (Mengshol 2000)
tnf_vegf_boost = 0.002                   # TNF -> VEGF (pannus neovascularization)
tnf_il6_induction = 0.0015              # TNF -> NF-kB -> IL-6 transcription (stronger coupling)

# IL-6 downstream effects
il6_inflammation_coupling = 0.002        # IL-6 -> JAK/STAT3 -> inflammation amplification
il6_cartilage_boost = 0.000025           # IL-6 -> RANKL -> osteoclast cartilage erosion

# Cartilage integrity (structural tissue target)
cartilage_basal = 1.0                    # normalized healthy cartilage integrity
cartilage_mmp_degradation = 0.00007      # aggrecanase/collagenase erosion (calibrated for 0.58 at d30)
cartilage_tnf_degradation = 0.00003      # direct TNF osteoclast activation

# Synovial pathology
pannus_fibroblast_boost = 2.0            # FLS hyperplasia boosts fibroblast recruitment
m1_prolongation = 2.0                    # sustained Th1 polarization extends M1 duration

# Synovial fluid / pannus tissue
# Firestein 2003 (doi:10.1038/nature01661): healthy synovium is 1-2 cell layers;
# RA pannus thickens to dense tissue of FLS, macrophages, and T cells.
synovial_basal = 0.1                     # thin healthy synovial lining
synovial_growth_rate = 0.002             # pannus growth per unit cytokine drive (faster)
synovial_carrying_capacity = 1.0         # max pannus density (fully developed)
synovial_cytokine_boost = 0.4            # pannus amplifies local cytokine production
synovial_erosion_boost = 0.3             # pannus proximity amplifies cartilage/bone erosion

# T cell density (adaptive immunity proxy)
# McInnes & Schett 2011 (doi:10.1056/NEJMra1004965): Th1/Th17 infiltration
tcell_diffusion = 0.01                   # slow T cell migration in tissue
tcell_decay = 0.008                      # apoptosis and lymphatic egress
tcell_recruitment = 0.001                # inflammation-driven extravasation
tcell_proliferation = 0.001              # antigen-driven clonal expansion (flare-gated)
tcell_carrying_capacity = 1.0            # local density cap (normalized)
tcell_cytokine_weight = 0.3              # T cell contribution to autoimmune cytokine modulation

# Subchondral bone integrity
# Schett & Gravallese 2012 (doi:10.1038/nrrheum.2012.153)
bone_basal = 1.0                         # normalized healthy bone integrity
bone_rankl_erosion = 0.00001             # IL-6 -> RANKL -> osteoclast resorption (calibrated for 0.77 at d30)
bone_tnf_erosion = 0.000007              # TNF direct osteoclast activation
bone_depth_z = -6.0                      # z threshold for bone tissue

# Drug pharmacokinetics (treatment onset ramp)
treatment_delay_h = 0                    # hours after wound before treatment starts
drug_onset_h = 0                         # hours for drug to reach peak effect

# Treatment: anti-TNF biologic (infliximab/adalimumab/etanercept)
anti_tnf_clearance = 0.0                 # 0 = no treatment; >0 = TNF neutralization rate

# Treatment: anti-IL-6R (tocilizumab)
anti_il6r_clearance = 0.0                # 0 = no treatment; >0 = IL-6 neutralization rate
