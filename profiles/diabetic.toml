# Profile: diabetic -- impaired healing
# Sources: see literature/data/SOURCES.yaml, diabetic_wound_healing section

[skin.diabetic]
mode = true

# Immune dysfunction
m1_duration_factor = 3.0              # M1 phase 3x longer (Mirza & Koh 2011, doi:10.1016/j.cyto.2011.06.016)
resolution_factor = 0.3               # M2 resolution 70% slower (Louiselle et al. 2021, doi:10.1016/j.trsl.2021.05.006)
efferocytosis_factor = 0.5            # efferocytosis 50% impaired (Khanna et al. 2010, doi:10.1371/journal.pone.0009539)
neutrophil_factor = 1.8               # 80% more neutrophils recruited (Wong et al. 2015, doi:10.1038/nm.3887)
neutrophil_lifespan_factor = 4.0      # neutrophils survive 4x longer, range 3-6x (Brem & Tomic-Canic 2007, doi:10.1172/JCI32169; PI3K inhibition of apoptosis)
neutrophil_apoptosis_factor = 0.15    # severely impaired apoptosis, range 0.1-0.3 (Alba-Loureiro et al. 2007, doi:10.1590/s0100-879x2006005000143)
neutrophil_waves_factor = 2.0         # double recruitment waves (chronic chemokines; Wetzler et al. 2000)
neutrophil_window_factor = 3.0        # triple spawn window (sustained IL-8; Acosta et al. 2008)
macrophage_taper_factor = 0.3         # slow recruitment decay (chronic MCP-1; Wood et al. 2007)
macrophage_apoptosis_factor = 0.3     # impaired macrophage apoptosis (NF-kB anti-apoptotic signaling; Mirza & Koh 2011)
macrophage_emigration_factor = 0.5    # impaired M2 lymphatic clearance (Louiselle et al. 2021)

# Keratinocyte dysfunction
prolif_factor = 0.5                   # proliferation halved (Wang & Graves 2020, doi:10.1155/2020/3714704)
migration_factor = 0.45               # migration 55% slower (Wang & Graves 2020, PI3K/ClC-2 deficits)

# Fibroblast dysfunction
fibroblast_activation_factor = 2.0    # activation 2x slower (Lerman et al. 2003, PMC1851127)
collagen_factor = 0.4                 # collagen 60% reduced (Goldberg et al. 2007, doi:10.1038/sj.jid.5700890)
fibroblast_lifespan_factor = 0.6      # lifespan 40% shorter (Lerman et al. 2003, oxidative stress)

# Chronic inflammation
baseline_inflammation = 0.001         # AGE/RAGE-driven NF-kB inflammation (Bierhaus et al. 2005, doi:10.1007/s00109-005-0688-7)
inflammation_sensitivity = 2.0        # impaired antioxidant defense (Rasik & Shukla 2000, doi:10.1046/j.1365-2613.2000.00158.x)
                                      # MMP growth factor degradation (Lobmann et al. 2002, doi:10.1007/s00125-002-0868-8)
migration_infl_K = 0.15              # Hill half-max for migration gating (Brownlee 2005, doi:10.2337/diabetes.54.6.1615)
prolif_infl_K = 0.20                 # Hill half-max for proliferation gating (Rasik & Shukla 2000)

# ECM remodeling imbalance
mmp_factor = 2.5                      # MMP overexpression, effective factor accounting for compounding with sustained M1 (Lobmann et al. 2002, doi:10.1007/s00125-002-0868-8)
timp_production_factor = 0.4          # reduced TIMP-1/2 expression (Lobmann et al. 2002, doi:10.1007/s00125-002-0868-8)

# Biofilm / vascular impairment
biofilm_clearance_factor = 0.5        # impaired neutrophil phagocytosis (Bjarnsholt et al. 2008, doi:10.1111/j.1524-475X.2007.00283.x)
vegf_factor = 0.4                     # HIF-1alpha impairment (Thangarajah et al. 2009, doi:10.1073/pnas.0906670106)
ph_recovery_factor = 0.5             # impaired acid buffering (Schneider et al. 2007)
no_factor = 0.6                       # impaired iNOS expression ~40% reduced (Witte et al. 2002, doi:10.1046/j.1365-2168.2002.02263.x)

[skin.lymphatic]
diabetic_lymphatic_factor = 0.4       # impaired lymphangiogenesis (Asai et al. 2012, doi:10.1016/j.ajpath.2012.08.023)

[skin.bioelectric]
diabetic_voltage_factor = 0.6         # impaired endogenous wound currents (Reid & Zhao 2014, doi:10.1089/wound.2013.0442)

[skin.temperature]
q10_migration = 2.0                   # activate Q10 for neuropathic cold extremities (McGuiness et al. 2004, doi:10.12968/jowc.2004.13.9.26702)
q10_proliferation = 2.0               # cold wound bed slows cell cycle (Arrhenius kinetics; Q10~2 for enzymatic rates)

[skin.perfusion]
basal = 0.7                           # microangiopathy, -22% capillary density (Dinh & Veves 2005, doi:10.1177/1534734605280130)
angio_rate = 0.002                    # impaired VEGF/FGF (Brem et al. 2006, doi:10.1097/01.prs.0000225459.93750.29)

# Glucose / NO impairment
[skin.glucose]
basal_conc = 1.8                      # hyperglycemia ~1.5-2x fasting glucose (Brownlee 2005, doi:10.2337/diabetes.54.6.1615)
age_inflammation = 0                  # diabetic_baseline_inflammation already models AGE/RAGE; avoid double-counting macrophage recruitment

[skin]
water_recovery_rate = 0.02            # barrier dysfunction + vascular deficit (Sakai et al. 2005, doi:10.1111/j.1365-2133.2005.06756.x)
