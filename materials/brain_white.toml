# Material: brain white matter (myelinated axon tracts)
# Jacques 2013 (doi:10.1088/0031-9155/58/11/R37)
[material]
id = 11
name = "brain_white"
category = "neural"

[material.optical]
absorption = 0.08       # mu_a (mm^-1) at 920 nm
scattering = 4.0        # mu_s' (mm^-1), high scattering from myelin sheaths
anisotropy = 0.85

[material.mechanical]
stiffness = 1.0         # kPa, slightly stiffer than grey
density = 1.04

[material.thermal]
conductivity = 0.50
specific_heat = 3600

[material.biological]
cell_types = ["oligodendrocyte", "astrocyte", "microglia"]
vascularized = true
innervated = false
