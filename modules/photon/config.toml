# Module: photon -- light transport for optogenetic and phototherapy applications
# Sources: Jacques 2013 (doi:10.1088/0031-9155/58/11/R37),
#          Mardinly et al. 2018 (doi:10.1038/s41593-018-0139-8),
#          Fenno et al. 2011 (doi:10.1146/annurev-neuro-061010-113817)
[skin.photon]
enabled = false                        # master switch

# Tissue optical properties (wavelength-dependent, defaults for 920 nm two-photon)
# Jacques 2013: absorption and reduced scattering coefficients for brain tissue
absorption_coeff = 0.1                 # mu_a (mm^-1), brain grey matter at 920 nm
scattering_coeff = 1.0                 # mu_s' reduced scattering (mm^-1)
anisotropy = 0.9                       # g, scattering anisotropy factor

# Source beam parameters (normalized units)
irradiance = 1.0                       # surface irradiance (normalized, 0 to 1)
beam_radius = 0.3                      # beam spot radius (simulation units)
beam_center_x = 0.0                    # beam center x (0 = wound center)
beam_center_y = 0.0                    # beam center y (0 = wound center)

# Diffusion approximation transport (fluence rate PDE)
# D = 1 / (3 * (mu_a + mu_s')), solved on diffusion grid
diffusion = 0.3                        # effective photon diffusion coefficient
decay = 0.1                           # absorption sink (mu_a contribution)

# Opsin kinetics (channelrhodopsin-2 two-state model)
# Fenno et al. 2011: ChR2 photocycle with light-dependent opening
opsin_activation_rate = 0.5            # light-driven closed-to-open transition rate
opsin_deactivation_rate = 0.1          # thermal dark-state recovery rate
opsin_saturation = 0.8                 # max opsin open fraction (photocurrent plateau)

# Phototoxicity coupling (light dose to ROS generation)
# Mardinly et al. 2018: high power density causes photodamage
phototoxicity_threshold = 0.5          # fluence threshold for ROS generation
phototoxicity_rate = 0.002             # ROS generation rate above threshold
thermal_coupling = 0.001               # absorbed light to temperature rise rate
