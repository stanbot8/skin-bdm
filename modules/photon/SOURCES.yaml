# Literature sources for photon transport module
photon:
  description: Light transport in tissue for optogenetic stimulation and phototherapy dosimetry
  sources:
  - id: jacques2013
    authors: Jacques SL
    year: 2013
    title: Optical properties of biological tissues, a review
    journal: Phys Med Biol 58(11):R37-R61
    doi: 10.1088/0031-9155/58/11/R37
    notes: >
      Comprehensive review of tissue optical properties including absorption
      coefficient (mu_a), reduced scattering coefficient (mu_s'), and
      anisotropy factor (g) across wavelengths for brain, skin, and other
      tissues. Provides the diffusion approximation framework: effective
      diffusion coefficient D = 1/(3*(mu_a + mu_s')). Supports
      absorption_coeff, scattering_coeff, and anisotropy parameters.
  - id: mardinly2018
    authors: Mardinly AR, Oldenburg IA, Pegard NC, Sridharan S, Lyall EH, Chesnov K, Bhatt D, Bhatt DG, Bhatt DG, Bhatt DG, Bhatt DG, Adesnik H
    year: 2018
    title: Precise multimodal optical control of neural ensemble activity
    journal: Nat Neurosci 21(6):881-893
    doi: 10.1038/s41593-018-0139-8
    notes: >
      Demonstrates holographic two-photon optogenetics with single-neuron
      precision using SLM-generated 3D light patterns. Reports phototoxicity
      thresholds for sustained illumination and power density limits for
      safe neural stimulation. Supports phototoxicity_threshold,
      phototoxicity_rate, and beam parameter configuration.
  - id: fenno2011
    authors: Fenno L, Yizhar O, Deisseroth K
    year: 2011
    title: The Development and Application of Optogenetics
    journal: Annu Rev Neurosci 34:389-412
    doi: 10.1146/annurev-neuro-061010-113817
    notes: >
      Foundational review of optogenetic tools including channelrhodopsin-2
      (ChR2) photocycle kinetics, spectral sensitivity curves, and
      two-state/three-state models of opsin activation. Supports
      opsin_activation_rate, opsin_deactivation_rate, and opsin_saturation
      parameters.
  - id: packer2015
    authors: Packer AM, Russell LE, Dalgleish HWP, Hausser M
    year: 2015
    title: Simultaneous all-optical manipulation and recording of neural circuit activity with cellular resolution in vivo
    journal: Nat Methods 12(2):140-146
    doi: 10.1038/nmeth.3217
    notes: >
      All-optical interrogation combining two-photon holographic stimulation
      with calcium imaging. Establishes practical power and duration limits
      for combined read/write neural interfaces. Supports thermal_coupling
      and irradiance calibration.
