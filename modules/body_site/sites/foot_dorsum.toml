# Body site: foot dorsum -- common diabetic ulcer location
# Thin skin, poor perfusion, high neuropathy risk, cool extremity.
# Lee & Hwang 2002 (doi:10.1007/s00276-002-0034-5)

[skin.body_site]
enabled = true
site = "foot_dorsum"

[skin.perfusion]
basal = 0.65

[skin.neuropathy]
basal_nerve_density = 0.6

[skin.temperature]
wound_surface = 0.865
