neuropathy:
  description: Cutaneous nerve density, neuropeptide signaling, and diabetic denervation
  sources:
  - id: suvas2017
    authors: Suvas S
    year: 2017
    title: Role of Substance P Neuropeptide in Inflammation, Wound Healing, and Tissue Homeostasis
    journal: J Immunol 199(5):1543-1552
    doi: 10.4049/jimmunol.1601751
    notes: >
      Comprehensive review of substance P in wound healing. SP promotes
      keratinocyte proliferation, fibroblast migration, angiogenesis, and
      neurogenic inflammation via NK1R. Supports substance_p_proliferation
      and substance_p_inflammation parameters.
  - id: boulton2005
    authors: Boulton AJ, Vinik AI, Arezzo JC, Bril V, Feldman EL, Freeman R, Malik RA, Maser RE, Sosenko JM, Ziegler D
    year: 2005
    title: Diabetic Neuropathies
    journal: Diabetes Care 28(4):956-962
    doi: 10.2337/diacare.28.4.956
    notes: >
      ADA technical review on diabetic peripheral neuropathy. Progressive
      sensory fiber loss, reduced nerve conduction velocity, impaired
      axon reflex. Supports diabetic_nerve_factor parameter.
  - id: callaghan2012
    authors: Callaghan BC, Cheng HT, Stables CL, Smith AL, Feldman EL
    year: 2012
    title: Diabetic neuropathy, clinical manifestations and current treatments
    journal: Lancet Neurol 11(6):521-534
    doi: 10.1016/s1474-4422(12)70065-0
    notes: >
      Review of pathogenesis including polyol pathway, AGE formation, PKC
      activation, and oxidative stress. Supports diabetic_regeneration_factor
      and integration with glucose/AGE module.
